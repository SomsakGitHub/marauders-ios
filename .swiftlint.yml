# MARK: - Paths
included:
  - Marauders
  - MaraudersTests
  - MaraudersUITests

excluded:
  - Pods
  - fastlane
  - .build
  - Scripts
  - Vendor
  - .git

# MARK: - Rules
opt_in_rules:
  - force_unwrapping
  - empty_count
  - array_init
  - closure_spacing
  - explicit_init
  - redundant_nil_coalescing

disabled_rules:
  - trailing_whitespace

# MARK: - Severity
force_unwrapping: error

# MARK: - Metrics
line_length:
  warning: 120
  error: 200
  ignores_comments: true
  ignores_urls: true

file_length:
  warning: 400
  error: 1000

type_body_length:
  warning: 300
  error: 800

cyclomatic_complexity:
  warning: 12
  error: 20

# MARK: - Custom rules
custom_rules:
  no_todo_comments:
    name: "No TODO comments"
    regex: "(//|/\\*)\\s*TODO[:\\s]"
    message: "Remove TODOs before merging."
    severity: warning

  no_debug_prints:
    name: "No debug prints"
    regex: "\\bprint\\("
    message: "Remove debug print statements."
    severity: warning

  no_force_try:
    name: "No try!"
    regex: "\\btry!\\b"
    message: "Avoid try!"
    severity: error

  analyzer_rules:
  - unused_declaration
  - unused_import